<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>Socket.IO Test Client</title>
</head>

<body>

  <h1>Socket.IO Test Client</h1>

  <p id="status">Disconnected</p>

  <input
    id="messageInput"
    type="text"
    placeholder="Enter message"
  />

  <button id="sendButton">
    Send Message
  </button>
  <button id="leaveButton">Leave Room</button>


  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

  <script>

    const TOKEN = "";

    const ROOM_ID = "generatedId1";


    // Connect to Socket.IO server
    const socket = io("http://localhost:3000", {
      auth: {
        token: TOKEN,
      },
    });


    // -----------------------------
    // SOCKET CONNECTED
    // -----------------------------

    socket.on("connect", () => {

      console.log("Connected to server");

      console.log("Socket ID:", socket.id);


      document.getElementById("status").innerText =
        `Connected: ${socket.id}`;


      // Join the chat room
      socket.emit(
        "join_room",

        {
          roomId: ROOM_ID,
        },

        (response) => {

          console.log(
            "Join room response:",
            response
          );

        }
      );

    });

document
  .getElementById("leaveButton")
  .addEventListener("click", () => {
    socket.emit(
      "leave_room",
      {
        roomId: ROOM_ID,
      },
      (response) => {
        console.log("Leave room response:", response);
      }
    );
  });

    // -----------------------------
    // SEND MESSAGE
    // -----------------------------

    document
      .getElementById("sendButton")
      .addEventListener("click", () => {

        const messageInput =
          document.getElementById("messageInput");

        const text = messageInput.value;


        socket.emit(
          "send_message",

          {
            roomId: ROOM_ID,
            text: text,
          },

          (response) => {

            console.log(
              "Send message response:",
              response
            );


            if (response.success) {

              messageInput.value = "";

            }

          }
        );

      });



    // -----------------------------
    // RECEIVE NEW MESSAGE
    // -----------------------------

    socket.on("new_message", (message) => {

      console.log(
        "New message received:",
        message
      );

    });



    // -----------------------------
    // SOCKET DISCONNECTED
    // -----------------------------

    socket.on("disconnect", (reason) => {

      console.log(
        "Disconnected from server"
      );

      console.log(
        "Reason:",
        reason
      );


      document.getElementById("status").innerText =
        "Disconnected";

    });



    // -----------------------------
    // CONNECTION ERROR
    // -----------------------------

    socket.on("connect_error", (error) => {

      console.error(
        "Connection failed:",
        error.message
      );


      document.getElementById("status").innerText =
        `Connection failed: ${error.message}`;

    });

  </script>

</body>
</html>
