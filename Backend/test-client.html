    type="text"

  />

    const ROOM_ID = "generatedId1";


    // Connect to Socket.IO server
    const socket = io("http://localhost:3000", {
      auth: {
        token: TOKEN,
      },
    });


    // -----------------------------
    // SOCKET CONNECTED
    // -----------------------------

    socket.on("connect", () => {

      console.log("Connected to server");

      console.log("Socket ID:", socket.id);


      document.getElementById("status").innerText =
        `Connected: ${socket.id}`;


      // Join the chat room
      socket.emit(
        "join_room",

        {
          roomId: ROOM_ID,
        },

        (response) => {

          console.log(
            "Join room response:",
            response
          );

        }
      );

    });



    // -----------------------------
    // SEND MESSAGE
    // -----------------------------

    document
      .getElementById("sendButton")
      .addEventListener("click", () => {

        const messageInput =
          document.getElementById("messageInput");

        const text = messageInput.value;


        socket.emit(
          "send_message",

          {
            roomId: ROOM_ID,
            text: text,
          },

          (response) => {

            console.log(
              "Send message response:",
              response
            );


            if (response.success) {

              messageInput.value = "";

            }

          }
        );

      });



    // -----------------------------
    // RECEIVE NEW MESSAGE
    // -----------------------------

    socket.on("new_message", (message) => {

      console.log(
        "New message received:",
        message
      );

    });



    // -----------------------------
    // SOCKET DISCONNECTED
    // -----------------------------

    socket.on("disconnect", (reason) => {

      console.log(
        "Disconnected from server"
      );

      console.log(
        "Reason:",
        reason
      );


      document.getElementById("status").innerText =
        "Disconnected";

    });



    // -----------------------------
    // CONNECTION ERROR
    // -----------------------------

    socket.on("connect_error", (error) => {

      console.error(
        "Connection failed:",
        error.message
      );


      document.getElementById("status").innerText =
        `Connection failed: ${error.message}`;

    });

  </script>

</body>
